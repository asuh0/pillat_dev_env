server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: traefik
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          project: infra
          __path__: /logs/traefik/*.log

  - job_name: php
    pipeline_stages:
      - regex:
          source: filename
          expression: '^/projects/(?P<project>[^/]+)/logs/php/.*$'
      - template:
          source: project_slug
          template: '{{ Replace .project "." "-" -1 }}'
      - labels:
          project:
          project_slug:
    static_configs:
      - targets:
          - localhost
        labels:
          job: php
          __path__: /projects/*/logs/php/*.log

  - job_name: nginx
    pipeline_stages:
      - regex:
          source: filename
          expression: '^/projects/(?P<project>[^/]+)/logs/nginx/.*$'
      - template:
          source: project_slug
          template: '{{ Replace .project "." "-" -1 }}'
      - labels:
          project:
          project_slug:
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /projects/*/logs/nginx/*.log

  - job_name: mysql
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql
          project: infra
          __path__: /logs/db/mysql/*.log

  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          project: infra
          __path__: /logs/db/postgres/*.log

  # Логи контейнеров: stdout/stderr через Docker API (docker.sock).
  # Метка stream=stdout|stderr — из __meta_docker_container_log_stream (если отдаёт движок).
  # pipeline: docker — разбор JSON-строк docker json-file, если они попали в поток.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
      - regex:
          source: container
          expression: '^(?P<project_slug>[a-z0-9][a-z0-9.-]*?)-(php|nginx|mysql|postgres|mariadb|redis|memcached)(?:-[0-9]+)?$'
      - labels:
          stream:
          project_slug:
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: '(.+)'
        target_label: 'compose_project_raw'
      - source_labels: ['project_slug']
        regex: '^$'
        target_label: 'project_slug'
        replacement: 'infra'
      - source_labels: ['project_slug']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(.+)'
        target_label: 'service'
