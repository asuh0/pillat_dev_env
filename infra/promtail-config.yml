server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: traefik
    pipeline_stages:
      - json:
          expressions:
            level_raw: level
      - regex:
          expression: '(?i)(?P<level_hint>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- $h := ToLower .level_hint -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else if eq $h "warning" -}}warn{{- else if eq $h "err" -}}error{{- else if ne $h "" -}}{{$h}}{{- else -}}info{{- end -}}'
      - labels:
          level:
      - labeldrop:
          - filename
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          project: infra
          service: traefik
          source: file
          stream: stdout
          container: unknown
          __path__: /logs/traefik/*.log

  - job_name: php
    pipeline_stages:
      - regex:
          source: filename
          expression: '^/projects/(?P<project>[^/]+)/logs/php/.*$'
      - regex:
          expression: '(?i)(?P<level_raw>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else -}}info{{- end -}}'
      - labels:
          project:
          level:
      - labeldrop:
          - filename
    static_configs:
      - targets:
          - localhost
        labels:
          job: php
          service: php
          source: file
          stream: stdout
          container: unknown
          __path__: /projects/*/logs/php/*.log

  - job_name: nginx
    pipeline_stages:
      - regex:
          source: filename
          expression: '^/projects/(?P<project>[^/]+)/logs/nginx/.*$'
      - regex:
          expression: '(?i)(?P<level_raw>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else -}}info{{- end -}}'
      - labels:
          project:
          level:
      - labeldrop:
          - filename
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          source: file
          stream: stdout
          container: unknown
          __path__: /projects/*/logs/nginx/*.log

  - job_name: mysql
    pipeline_stages:
      - regex:
          expression: '(?i)(?P<level_raw>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else -}}info{{- end -}}'
      - labels:
          level:
      - labeldrop:
          - filename
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql
          project: infra
          service: mysql
          source: file
          stream: stdout
          container: unknown
          __path__: /logs/db/mysql/*.log

  - job_name: postgres
    pipeline_stages:
      - regex:
          expression: '(?i)(?P<level_raw>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else -}}info{{- end -}}'
      - labels:
          level:
      - labeldrop:
          - filename
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          project: infra
          service: postgres
          source: file
          stream: stdout
          container: unknown
          __path__: /logs/db/postgres/*.log

  # stdout/stderr контейнеров: только канонические лейблы (см. README).
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
      - regex:
          expression: '(?i)(?P<level_raw>error|warn(?:ing)?|debug|info|notice|err)\b'
      - template:
          source: level
          template: '{{- $r := ToLower .level_raw -}}{{- if eq $r "warning" -}}warn{{- else if eq $r "err" -}}error{{- else if ne $r "" -}}{{$r}}{{- else -}}info{{- end -}}'
      - labels:
          level:
      - labeldrop:
          - filename
          - service_name
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_pillat_project']
        regex: '(.+)'
        target_label: 'project'
      - source_labels: ['project']
        regex: '^$'
        replacement: 'infra'
        target_label: 'project'
      - source_labels: ['__meta_docker_container_log_stream']
        regex: '(stdout|stderr)'
        target_label: 'stream'
      - source_labels: ['stream']
        regex: '^$'
        replacement: 'stdout'
        target_label: 'stream'
      - target_label: 'source'
        replacement: 'docker'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(.+)'
        target_label: 'service'
      - source_labels: ['service']
        regex: '^$'
        replacement: 'unknown'
        target_label: 'service'
