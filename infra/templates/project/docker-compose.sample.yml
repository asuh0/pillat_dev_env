networks:
  infra_proxy:
    external: true
    name: infra_proxy

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.php83
      args:
        PHP_VERSION: 8.3
    container_name: project4-static-loc-php
    volumes:
      - ./www:/opt/www
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
    environment:
      - PHP_IDE_CONFIG=serverName=project4-static.loc
      - TZ=${TZ:-Europe/Moscow}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - infra_proxy
    labels:
      - "pillat.project=project4-static.loc"
      - "traefik.enable=false"

  nginx:
    image: nginx:alpine
    container_name: project4-static-loc-nginx
    volumes:
      - ./www:/opt/www:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - infra_proxy
    labels:
      - "pillat.project=project4-static.loc"
      - "traefik.enable=true"
      - "traefik.http.routers.project4-static.rule=Host(`project4-static.loc`)"
      - "traefik.http.routers.project4-static.entrypoints=web"
      - "traefik.http.services.project4-static.loadbalancer.server.port=80"
