; Дополнение к php-fpm.d/docker.conf образа php-fpm (не переопределять error_log/access).
;
; В типичном контейнере у PID 1 дескриптор 1 часто указывает на /dev/null, а не на
; pipe Docker — поэтому пути вида /proc/1/fd/1 теряют логи. Оставляем глобальные
; настройки из docker.conf (/proc/self/fd/2).
;
; Здесь только выравнивание пула с php.ini: ошибки PHP в stderr воркера.

[www]
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
