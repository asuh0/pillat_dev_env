apiVersion: 1

# URL без суффикса /loki: плагин Loki в Grafana сам обращается к /loki/api/v1/...
# (см. loki-config.yml: common.path_prefix: /loki на стороне Loki).
# Раньше url: http://loki:3100/loki давало двойной /loki/... и ломало provisioning/запросы.
#
# deleteDatasources снимает конфликт со старым Loki в grafana.db (другой uid).
deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - name: Loki
    uid: loki-infra
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
